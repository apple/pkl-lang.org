        cache: gradle
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
      with:
        cache-workspaces: pkl-html-highlighter
    - name: Configure cargo
      run: |-
        cat <<EOF > ~/.cargo/config
        [net]
        git-fetch-with-cli = true
        EOF
